<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>割り勘計算機</title>
    
    <link rel="icon" href="/favicon.jpg">
    <link rel="apple-touch-icon" href="/favicon.jpg">
    <meta name="msapplication-TileImage" content="/favicon.jpg">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        /* === 全体のベースデザイン（ポートフォリオ統一規格） === */
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2d3436;
            --border: 2px solid #000;
            --shadow: 4px 4px 0px #000;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* ヘッダー */
        .header {
            padding: 20px 40px;
            background: #fff;
            border-bottom: var(--border);
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.05em;
        }

        /* コンテナとレイアウト */
        .app-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }
        @media (min-width: 768px) {
            .app-container { flex-direction: row; }
            .left-pane, .right-pane { flex: 1; }
        }

        /* カード（パネル）共通スタイル */
        .card {
            background: var(--card);
            border: var(--border);
            border-radius: 8px;
            padding: 25px;
            box-shadow: var(--shadow);
        }

        .card h2 {
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
            text-transform: uppercase;
            border-bottom: 3px solid #000;
            display: inline-block;
            padding-bottom: 5px;
            letter-spacing: 1px;
        }

        /* フォーム部品 */
        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 14px;
        }
        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: var(--border);
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            box-sizing: border-box;
            background: #fafafa;
            color: var(--text);
            transition: 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            background: #fff;
            box-shadow: 2px 2px 0px #000;
        }

        /* メンバー名前入力エリア（サブカード風） */
        .names-container {
            background: #f1f2f6;
            padding: 15px;
            border: 2px dashed #000;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* 右側：初期状態 */
        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 0;
            font-weight: 800;
        }
        .empty-state i {
            font-size: 50px;
            color: #ddd;
            margin-bottom: 15px;
        }

        /* 結果リスト */
        .result-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 20px;
            font-weight: 800;
        }
        .result-list li {
            padding: 15px 10px;
            border-bottom: 2px dashed #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .result-list li:last-child { border-bottom: none; }
        .result-amount { color: #e53935; font-size: 24px; }

        /* 余りアラート・オプション */
        .remainder-alert {
            background: #ffeaa7;
            border: var(--border);
            color: #d35400;
            padding: 15px;
            border-radius: 8px;
            font-weight: 800;
            text-align: center;
            margin: 25px 0;
            font-size: 18px;
            box-shadow: 2px 2px 0px #000;
        }

        .remainder-options {
            background: #fafafa;
            border: var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }
        .checkbox-group label {
            background: #fff;
            border: var(--border);
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px; height: 18px; accent-color: #000;
        }

        /* === 指定のボタンデザイン === */
        .button_solid016 { margin: 20px 0; }
        .button_solid016 a {
            background: #6bb6ff; border-radius: 5px; position: relative; display: flex;
            justify-content: center; align-items: center; margin: 0 auto;
            max-width: 100%; padding: 12px 25px; color: #003067; transition: 0.3s;
            font-weight: 800; border: 2px solid #000; text-decoration: none; z-index: 1; cursor: pointer;
        }
        .button_solid016 a:before {
            content: ""; width: 100%; height: 100%; position: absolute; z-index: -1;
            border: 2px solid #000; border-radius: 5px; background: #e1f3ff;
            background-image: linear-gradient(45deg, #c8e4ff 25%, transparent 0), linear-gradient(45deg, transparent 75%, #c8e4ff 0), linear-gradient(45deg, #c8e4ff 25%, transparent 0), linear-gradient(45deg, transparent 75%, #c8e4ff 0);
            background-position: 0 0, 15px 15px, 15px 15px, 30px 30px; background-size: 30px 30px;
        }
        .button_solid016 a:after {
            position: absolute; top: 0; bottom: 0; left: -2px; width: calc(100% + 4px); height: 100%; content: '';
            transition: all .3s; transform: translate3d(0, 0.40rem, -1rem);
            border: 2px solid #000; border-radius: inherit; background: #2b7fde;
            box-shadow: 0 0.4rem 0 0 rgb(0 0 0 / 20%); z-index: -2;
        }
        .button_solid016 a i { position: absolute; right: 15px; }
        .button_solid016 a .fa-calculator { right: auto; left: 15px; }
        .button_solid016 a:hover { transform: translate3d(0, 0.2rem, -1rem); }
        .button_solid016 a:hover:after { transform: translate3d(0, 0.2rem, -1rem); box-shadow: 0 0.2rem 0 0 rgb(0 0 0 / 20%); }

        /* ガチャ用ボタン（オレンジ） */
        .btn-gacha a { background: #ffb347; color: #5a3200; }
        .btn-gacha a:before { background: #fff0db; background-image: linear-gradient(45deg, #ffd8a6 25%, transparent 0), linear-gradient(45deg, transparent 75%, #ffd8a6 0), linear-gradient(45deg, #ffd8a6 25%, transparent 0), linear-gradient(45deg, transparent 75%, #ffd8a6 0); }
        .btn-gacha a:after { background: #f39c12; }

        /* 決定用ボタン（グリーン） */
        .btn-success a { background: #81c784; color: #003300; }
        .btn-success a:before { background: #e8f5e9; background-image: linear-gradient(45deg, #c8e6c9 25%, transparent 0), linear-gradient(45deg, transparent 75%, #c8e6c9 0), linear-gradient(45deg, #c8e6c9 25%, transparent 0), linear-gradient(45deg, transparent 75%, #c8e6c9 0); }
        .btn-success a:after { background: #4caf50; }

        hr.divider { border: 0; border-bottom: 2px dashed #000; margin: 25px 0; }
    </style>
</head>
<body>

<header class="header">割り勘計算機</header>

<div class="app-container">
    
    <!-- ▼ 左側：入力セクション ▼ -->
    <div class="left-pane card">
        <h2>Input Details</h2>
        
        <div class="input-group">
            <label for="total-amount">合計金額（円）</label>
            <input type="number" id="total-amount" placeholder="例: 15800" min="1">
        </div>

        <div class="input-group">
            <label for="num-people">人数（人）</label>
            <input type="number" id="num-people" placeholder="例: 4" min="1" oninput="generateNameInputs()">
        </div>

        <div class="names-container" id="names-container" style="display:none;">
            <p style="margin-top:0; font-weight:800; font-size:14px; text-align:center;">メンバーの名前（任意）</p>
            <div id="names-list"></div>
        </div>

        <div class="button_solid016">
            <a onclick="calculateBase()"><i class="fas fa-calculator"></i>まずは均等に計算<i class="fas fa-angle-right"></i></a>
        </div>
    </div>

    <!-- ▼ 右側：結果・余り処理セクション ▼ -->
    <div class="right-pane card">
        <h2>Result</h2>
        
        <!-- 初期状態 -->
        <div class="empty-state" id="empty-state">
            <i class="fas fa-receipt"></i><br>
            左で金額と人数を入力して<br>計算ボタンを押してください
        </div>

        <div class="result-area" id="result-area" style="display: none;">
            <ul class="result-list" id="result-list">
                <!-- 結果リスト -->
            </ul>

            <!-- 余り処理エリア -->
            <div id="remainder-section" style="display: none;">
                <div class="remainder-alert" id="remainder-text"></div>

                <div class="remainder-options">
                    
                    <!-- ガチャ機能 -->
                    <div style="text-align:center; font-weight:bold; font-size:14px;">＼ 運任せ！ ／</div>
                    <div class="button_solid016 btn-gacha">
                        <a onclick="executeGacha()">ガチャで1人が払う<i class="fas fa-random"></i></a>
                    </div>
                    
                    <hr class="divider">

                    <!-- 指定メンバーで割る機能 -->
                    <div style="text-align:center; font-weight:bold; font-size:14px; margin-bottom:15px;">＼ 特定の人で分ける ／</div>
                    <div class="checkbox-group" id="remainder-checkboxes">
                        <!-- チェックボックス -->
                    </div>

                    <div class="input-group">
                        <label for="final-boss">さらに余った時の最後の1人：</label>
                        <select id="final-boss"></select>
                    </div>

                    <div class="button_solid016 btn-success" style="margin-top:20px;">
                        <a onclick="calculateRemainder()">余りを指定通りに配分<i class="fas fa-check"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    let participants = []; 
    let currentRemainder = 0;

    function generateNameInputs() {
        const num = parseInt(document.getElementById('num-people').value) || 0;
        const container = document.getElementById('names-container');
        const list = document.getElementById('names-list');
        
        if (num > 0) {
            container.style.display = 'block';
            let html = '';
            for (let i = 1; i <= num; i++) {
                html += `<div class="input-group" style="margin-bottom:10px;">
                            <input type="text" id="name-${i}" placeholder="${i}人目の名前" value="メンバー${i}">
                         </div>`;
            }
            list.innerHTML = html;
        } else {
            container.style.display = 'none';
        }
        
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('empty-state').style.display = 'block';
    }

    function calculateBase() {
        const total = parseInt(document.getElementById('total-amount').value) || 0;
        const num = parseInt(document.getElementById('num-people').value) || 0;

        if (total <= 0 || num <= 0) {
            alert("金額と人数を正しく入力してください。");
            return;
        }

        participants = [];
        for (let i = 1; i <= num; i++) {
            let nameVal = document.getElementById(`name-${i}`).value || `メンバー${i}`;
            participants.push({ id: i, name: nameVal, amount: 0 });
        }

        const baseAmount = Math.floor(total / num);
        currentRemainder = total % num;

        participants.forEach(p => p.amount = baseAmount);

        updateUI();
        
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
    }

    function updateUI() {
        const resultList = document.getElementById('result-list');
        resultList.innerHTML = '';
        participants.forEach(p => {
            resultList.innerHTML += `<li><span>${p.name}</span> <span class="result-amount">${p.amount.toLocaleString()} 円</span></li>`;
        });

        const remainderSection = document.getElementById('remainder-section');
        if (currentRemainder > 0) {
            document.getElementById('remainder-text').innerText = `現在、余りが ${currentRemainder} 円 あります！`;
            remainderSection.style.display = 'block';

            const cbContainer = document.getElementById('remainder-checkboxes');
            cbContainer.innerHTML = '';
            participants.forEach(p => {
                cbContainer.innerHTML += `<label><input type="checkbox" class="rem-target" value="${p.id}"> ${p.name}</label>`;
            });

            const bossSelect = document.getElementById('final-boss');
            bossSelect.innerHTML = '';
            participants.forEach(p => {
                bossSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });
        } else {
            remainderSection.style.display = 'none';
        }
    }

    function executeGacha() {
        if(currentRemainder <= 0) return;
        
        const winnerIndex = Math.floor(Math.random() * participants.length);
        const winner = participants[winnerIndex];
        
        winner.amount += currentRemainder;
        alert(`🎉 ガチャ結果 🎉\n\n余りの ${currentRemainder}円 は\n【 ${winner.name} 】さんが払います！`);
        
        currentRemainder = 0;
        updateUI();
    }

    function calculateRemainder() {
        if(currentRemainder <= 0) return;

        const checkboxes = document.querySelectorAll('.rem-target:checked');
        if (checkboxes.length === 0) {
            alert("余りを分担する人を1人以上選択してください！");
            return;
        }

        const selectedIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
        const splitBase = Math.floor(currentRemainder / selectedIds.length);
        const splitRem = currentRemainder % selectedIds.length;

        selectedIds.forEach(id => {
            let p = participants.find(p => p.id === id);
            p.amount += splitBase;
        });

        let message = `選択したメンバーに余りを配分しました。`;

        if (splitRem > 0) {
            const bossId = parseInt(document.getElementById('final-boss').value);
            let boss = participants.find(p => p.id === bossId);
            boss.amount += splitRem;
            message += `\n\nさらに割り切れなかった ${splitRem}円 は設定通り 【 ${boss.name} 】さんが払います！`;
        }

        alert(message);
        
        currentRemainder = 0;
        updateUI();
    }
</script>

</body>
</html>
