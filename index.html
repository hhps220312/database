<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>割り勘計算機</title>
    
    <!-- ファビコン・iOS・Android用アイコン設定 -->
    <link rel="icon" href="/favicon.jpg">
    <link rel="apple-touch-icon" href="/favicon.jpg">
    <meta name="msapplication-TileImage" content="/favicon.jpg">
    
    <!-- FontAwesome (ボタンのアイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        /* === ベースデザイン（テキストツールと統一） === */
        :root { 
            --bg: #f8f9fa; 
            --card: #ffffff; 
            --text: #2d3436; 
            --accent: #6bb6ff; 
        }
        
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0; 
        }

        /* ヘッダー */
        .header { 
            padding: 20px 40px; 
            background: #fff; 
            border-bottom: 2px solid #000; 
            font-weight: 800; 
            font-size: 1.5rem; 
            letter-spacing: -0.05em; 
        }

        /* コンテナ */
        .app-container { 
            display: flex; 
            gap: 30px; 
            max-width: 1000px; 
            margin: 30px auto; 
            padding: 0 20px; 
        }

        /* 左右分割 */
        .left-panel, .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* カードデザイン */
        .card { 
            background: var(--card); 
            border: 2px solid #000; 
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: 4px 4px 0px #000; 
        }

        h3 { 
            font-size: 16px; 
            margin-top: 0;
            margin-bottom: 20px; 
            text-transform: uppercase; 
            border-bottom: 2px solid #000; 
            display: inline-block; 
            padding-bottom: 3px;
        }

        /* 入力フォームエリア */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 12px;
            border: 2px solid #000;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fff;
            color: var(--text);
            font-family: inherit;
        }
        
        input:focus, select:focus {
            outline: none;
            background: #f0f8ff;
        }

        .names-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #ccc;
        }

        /* 右側：初期状態（プレースホルダー） */
        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .empty-state i {
            font-size: 48px;
            color: #ddd;
            margin-bottom: 15px;
        }

        /* 結果表示エリア */
        .result-area {
            display: none;
        }

        .result-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 18px;
            font-weight: 800;
        }
        .result-list li {
            padding: 12px 5px;
            border-bottom: 2px dotted #ccc;
            display: flex;
            justify-content: space-between;
        }
        .result-list li:last-child {
            border-bottom: none;
        }

        /* 余りアラート */
        .remainder-alert {
            background: #ffeb3b; /* ハイライトと同じ黄色 */
            border: 2px solid #000;
            color: #000;
            padding: 12px;
            border-radius: 5px;
            font-weight: 800;
            text-align: center;
            margin: 20px 0;
        }

        .checkbox-group {
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .checkbox-group label {
            display: inline-flex;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            background: #f8f9fa;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .checkbox-group input {
            margin-right: 8px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 15px;
        }

        /* === ボタンデザイン（統一版） === */
        .button_solid016 { margin-top: 20px; }
        .button_solid016 a {
            background: #6bb6ff; border-radius: 5px; position: relative; display: flex;
            justify-content: center; align-items: center; margin: 0 auto; width: 100%;
            box-sizing: border-box;
            padding: 12px 20px; color: #003067; transition: 0.3s; font-weight: 800;
            border: 2px solid #000; text-decoration: none; z-index: 1; cursor: pointer;
        }
        .button_solid016 a:before {
            content: ""; width: 100%; height: 100%; position: absolute; z-index: -1;
            top: 0; left: 0;
            border: 2px solid #000; border-radius: 5px; background: #e1f3ff;
            background-image: linear-gradient(45deg, #c8e4ff 25%, transparent 0), linear-gradient(45deg, transparent 75%, #c8e4ff 0);
            background-size: 30px 30px;
        }
        .button_solid016 a:after {
            position: absolute; top: 0; bottom: 0; left: -2px; width: calc(100% + 4px); height: 100%; content: '';
            transition: all .3s; transform: translate3d(0, 0.40rem, -1rem);
            border: 2px solid #000; border-radius: 5px; background: #2b7fde;
            box-shadow: 0 0.4rem 0 0 rgb(0 0 0 / 20%); z-index: -2;
        }
        .button_solid016 a:hover { transform: translate3d(0, 0.2rem, -1rem); }
        .button_solid016 a:hover:after { transform: translate3d(0, 0.2rem, -1rem); box-shadow: 0 0.2rem 0 0 rgb(0 0 0 / 20%); }
        .button_solid016 a i { position: absolute; right: 15px; }
        
        /* ガチャ・決定ボタン用バリエーション */
        .btn-orange a { background: #ffb347; color: #5a3000; }
        .btn-orange a:before { background: #ffe6c4; background-image: linear-gradient(45deg, #ffcca3 25%, transparent 0), linear-gradient(45deg, transparent 75%, #ffcca3 0); }
        .btn-orange a:after { background: #e08b16; }

        .btn-green a { background: #81c784; color: #003300; }
        .btn-green a:before { background: #c8e6c9; background-image: linear-gradient(45deg, #a5d6a7 25%, transparent 0), linear-gradient(45deg, transparent 75%, #a5d6a7 0); }
        .btn-green a:after { background: #529e55; }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
        }
    </style>
</head>
<body>

<header class="header">割り勘計算機</header>

<div class="app-container">
    
    <!-- ▼ 左側：入力セクション ▼ -->
    <div class="left-panel">
        <div class="card">
            <h3>Setting</h3>
            
            <div class="input-group">
                <label for="total-amount">合計金額（円）</label>
                <input type="number" id="total-amount" placeholder="例: 15800" min="1">
            </div>

            <div class="input-group">
                <label for="num-people">人数（人）</label>
                <input type="number" id="num-people" placeholder="例: 4" min="1" oninput="generateNameInputs()">
            </div>

            <div class="names-container" id="names-container" style="display:none;">
                <label style="font-weight:800; font-size:14px; display:block; margin-bottom:10px;">メンバーの名前（任意）</label>
                <div id="names-list"></div>
            </div>

            <div class="button_solid016">
                <a onclick="calculateBase()">均等に割る<i class="fas fa-calculator"></i></a>
            </div>
        </div>
    </div>

    <!-- ▼ 右側：結果・余り処理セクション ▼ -->
    <div class="right-panel">
        
        <!-- 初期状態のプレースホルダー -->
        <div class="card empty-state" id="empty-state">
            <i class="fas fa-receipt"></i>
            左で条件を入力して<br>計算してください
        </div>

        <!-- 結果表示 -->
        <div class="result-area" id="result-area">
            <div class="card">
                <h3>Result</h3>
                <ul class="result-list" id="result-list">
                    <!-- 結果がここに表示されます -->
                </ul>
            </div>

            <!-- 余りがある場合のみ表示されるエリア -->
            <div id="remainder-section" style="display: none;" class="card">
                <div class="remainder-alert" id="remainder-text"></div>

                <div class="section-title">🌟 余りはどうする？ 🌟</div>
                
                <!-- ガチャ機能 -->
                <div class="button_solid016 btn-orange">
                    <a onclick="executeGacha()">ガチャで1人が払う<i class="fas fa-random"></i></a>
                </div>
                
                <hr style="border: 1px dashed #ccc; margin: 25px 0;">

                <!-- 指定メンバーで割る機能 -->
                <div class="section-title">特定の人で分ける</div>
                <div class="checkbox-group" id="remainder-checkboxes">
                    <!-- チェックボックスが生成されます -->
                </div>

                <div class="input-group">
                    <label for="final-boss" style="font-size:12px;">さらに余った時の最後の1人：</label>
                    <select id="final-boss">
                        <!-- セレクトボックスが生成されます -->
                    </select>
                </div>
                <div class="button_solid016 btn-green" style="margin-top:10px;">
                    <a onclick="calculateRemainder()">指定通りに配分する<i class="fas fa-check"></i></a>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    let participants = []; 
    let currentRemainder = 0;

    function generateNameInputs() {
        const num = parseInt(document.getElementById('num-people').value) || 0;
        const container = document.getElementById('names-container');
        const list = document.getElementById('names-list');
        
        if (num > 0) {
            container.style.display = 'block';
            let html = '';
            for (let i = 1; i <= num; i++) {
                html += `<div class="input-group">
                            <input type="text" id="name-${i}" placeholder="${i}人目の名前" value="メンバー${i}">
                         </div>`;
            }
            list.innerHTML = html;
        } else {
            container.style.display = 'none';
        }
        
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('empty-state').style.display = 'flex';
    }

    function calculateBase() {
        const total = parseInt(document.getElementById('total-amount').value) || 0;
        const num = parseInt(document.getElementById('num-people').value) || 0;

        if (total <= 0 || num <= 0) {
            alert("金額と人数を正しく入力してください。");
            return;
        }

        participants = [];
        for (let i = 1; i <= num; i++) {
            let nameVal = document.getElementById(`name-${i}`).value || `メンバー${i}`;
            participants.push({ id: i, name: nameVal, amount: 0 });
        }

        const baseAmount = Math.floor(total / num);
        currentRemainder = total % num;

        participants.forEach(p => p.amount = baseAmount);

        updateUI();
        
        document.getElementById('empty-state').style.display = 'none';
        document.getElementById('result-area').style.display = 'flex';
        document.getElementById('result-area').style.flexDirection = 'column';
        document.getElementById('result-area').style.gap = '20px';
    }

    function updateUI() {
        const resultList = document.getElementById('result-list');
        resultList.innerHTML = '';
        participants.forEach(p => {
            resultList.innerHTML += `<li><span>${p.name}</span> <span>${p.amount.toLocaleString()} 円</span></li>`;
        });

        const remainderSection = document.getElementById('remainder-section');
        if (currentRemainder > 0) {
            document.getElementById('remainder-text').innerText = `現在、余りが ${currentRemainder} 円 あります！`;
            remainderSection.style.display = 'block';

            const cbContainer = document.getElementById('remainder-checkboxes');
            cbContainer.innerHTML = '';
            participants.forEach(p => {
                cbContainer.innerHTML += `<label><input type="checkbox" class="rem-target" value="${p.id}"> ${p.name}</label>`;
            });

            const bossSelect = document.getElementById('final-boss');
            bossSelect.innerHTML = '';
            participants.forEach(p => {
                bossSelect.innerHTML += `<option value="${p.id}">${p.name}</option>`;
            });
        } else {
            remainderSection.style.display = 'none';
        }
    }

    function executeGacha() {
        if(currentRemainder <= 0) return;
        
        const winnerIndex = Math.floor(Math.random() * participants.length);
        const winner = participants[winnerIndex];
        
        winner.amount += currentRemainder;
        alert(`🎉 ガチャ結果 🎉\n\n余りの ${currentRemainder}円 は\n【 ${winner.name} 】さんが払います！`);
        
        currentRemainder = 0;
        updateUI();
        alert("きれいに割り切れました！（余り0円）");
    }

    function calculateRemainder() {
        if(currentRemainder <= 0) return;

        const checkboxes = document.querySelectorAll('.rem-target:checked');
        if (checkboxes.length === 0) {
            alert("余りを分担する人を1人以上選択してください！");
            return;
        }

        const selectedIds = Array.from(checkboxes).map(cb => parseInt(cb.value));
        const splitBase = Math.floor(currentRemainder / selectedIds.length);
        const splitRem = currentRemainder % selectedIds.length;

        selectedIds.forEach(id => {
            let p = participants.find(p => p.id === id);
            p.amount += splitBase;
        });

        let message = `選択したメンバーに余りを配分しました。`;

        if (splitRem > 0) {
            const bossId = parseInt(document.getElementById('final-boss').value);
            let boss = participants.find(p => p.id === bossId);
            boss.amount += splitRem;
            message += `\n\nさらに割り切れなかった ${splitRem}円 は設定通り 【 ${boss.name} 】さんが払います！`;
        }

        alert(message);
        currentRemainder = 0;
        updateUI();
        alert("きれいに割り切れました！（余り0円）");
    }
</script>

</body>
</html>
